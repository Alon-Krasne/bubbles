# GitHub Pages Deployment Workflow
# Builds the Vite project and deploys to GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          SITE_PASSWORD_HASH: ${{ secrets.SITE_PASSWORD && hashFiles('.github/workflows/deploy-pages.yml') != '' && '' || '' }}
        run: |
          # Hash the password using SHA-256
          if [ -n "${{ secrets.SITE_PASSWORD }}" ]; then
            export SITE_PASSWORD_HASH=$(echo -n "${{ secrets.SITE_PASSWORD }}" | tr '[:upper:]' '[:lower:]' | sha256sum | cut -d' ' -f1)
          fi
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
